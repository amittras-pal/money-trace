name: Train and Update Expense Classifier Model

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: write

jobs:
  train-model:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          cd model-training
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run training pipeline
        env:
          DB_URI: ${{ secrets.DB_URI }}
        run: |
          cd model-training
          python train_pipeline.py
          
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update expense classifier model and artifacts [skip ci]"
          title: "Update Expense Classifier Model"
          body: "This PR updates the expense classifier ONNX model, classes map, and evaluation report."
          branch: "update-model-artifacts"
          branch-suffix: "timestamp"
          base: "main"
          add-paths: |
            src/ml-models/expense_classifier.onnx
            src/ml-models/classes.json
            src/ml-models/evaluation_report.csv
