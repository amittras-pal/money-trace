name: Train and Update Expense Classifier Model

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train-model:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          cd model-training
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run training pipeline
        env:
          DB_URI: ${{ secrets.DB_URI }}
        run: |
          cd model-training
          python train_pipeline.py
          
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Stage the specific model artifacts
          git add src/ml-models/expense_classifier.onnx
          git add src/ml-models/classes.json
          git add src/ml-models/evaluation_report.csv
          
          # Commit only if there are changes
          git diff --staged --quiet || git commit -m "Update expense classifier model and artifacts [skip ci]"
          
          # Push the changes back to the repository
          git push
