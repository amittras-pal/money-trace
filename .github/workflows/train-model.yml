name: Train and Update Expense Classifier Model

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  train-model:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          cd model-training
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run training pipeline
        env:
          DB_URI: ${{ secrets.DB_URI }}
        run: |
          cd model-training
          python train_pipeline.py
          
      - name: Create Model Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd src/ml-models
          
          # Bundle the model and classes
          tar -czvf model_bundle.tar.gz expense_classifier.onnx classes.json
          
          # Generate a unique release tag
          TAG_NAME="model-update-$(date +'%Y%m%d-%H%M%S')"
          
          # Create the GitHub Release with the bundle and report, using report as body
          gh release create "$TAG_NAME" \
            model_bundle.tar.gz report.md \
            --title "Automated Model Update: $TAG_NAME" \
            --notes-file report.md

      - name: Trigger Render Deployment
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK_URL"
            echo "Triggered Render deployment."
          else
            echo "No RENDER_DEPLOY_HOOK_URL secret found. Skipping automatic deployment."
          fi
