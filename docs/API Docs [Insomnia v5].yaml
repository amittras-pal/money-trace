          id: req_ffe972a70d874c91ba91433900032eff
          created: 1725118612023
          modified: 1755239922038
          isPrivate: false
          description: >-
            ### Description:

            - Search expenses with text match / category / date range.

            - At least one of `q` / combination of `startDate + endDate` /
            `categories` must be provided.


            ### Request Body:


            ```

            {
            	"q": "", // query string to match words.
            	"startDate": "", // ISO-8601 formatted timestamp
            	"endDate": "", // ISO-8601 formatted timestamp
